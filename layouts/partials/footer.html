<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-left">
      <span class="footer-name">{{ .Site.Params.author }}</span>
      <span class="footer-sep">&mdash;</span>
      <span class="footer-role">{{ .Site.Params.role }}</span>
    </div>
    <div class="footer-links">
      {{ with .Site.Params.github }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>{{ end }}
      {{ with .Site.Params.linkedin }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="LinkedIn">LinkedIn</a>{{ end }}
    </div>
  </div>
</footer>
