{{ define "main" }}
<section class="page-header">
  <h1 class="page-title">{{ .Title }}</h1>
</section>
<div class="default-list">
  {{ range .Pages }}
  <article>
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p>{{ .Summary | plainify | truncate 200 }}</p>
  </article>
  {{ end }}
</div>
{{ end }}
